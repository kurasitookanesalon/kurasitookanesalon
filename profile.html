<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>講師紹介 | くらしとお金サロン</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-blue: #1E5BB8; --sub-blue: #163E7A; --gold: #B89436; --red: #E50012; --bg-white: #FFFFFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg-white); color: #333; line-height: 1.9; overflow-x: hidden; }

        .reveal { opacity: 0; transform: translateY(15px); transition: all 1.2s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        header { padding: 30px 0 10px; text-align: center; }
        .top-logo { width: 100px; height: auto; margin: 0 auto; display: block; }

        .container { max-width: 650px; margin: 0 auto; padding: 0 24px 180px; }

        .page-title { font-family: 'Noto Serif JP', serif; font-size: 32px; color: var(--sub-blue); text-align: center; margin: 40px 0 10px; }
        .page-sub { font-size: 16px; font-weight: 700; color: var(--gold); text-align: center; margin-bottom: 50px; display: block; }

        .profile-img { width: 100%; max-width: 380px; border-radius: 8px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); display: block; margin: 0 auto 40px; }

        .name-area { text-align: center; margin-bottom: 45px; }
        .name-area h2 { font-family: 'Noto Serif JP', serif; font-size: 28px; color: var(--sub-blue); margin: 0; }

        @keyframes fuwafuwa {
            0% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
            100% { transform: translateX(-50%) translateY(0); }
        }

        .line-float-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 380px;
            background-color: #06C755;
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            animation: fuwafuwa 3s infinite ease-in-out;
        }
        .line-float-btn i { font-size: 26px; margin-right: 12px; }

        .btn-back { display: block; width: 100%; max-width: 280px; margin: 60px auto 0; padding: 16px; border: 1.5px solid var(--sub-blue); color: var(--sub-blue); border-radius: 8px; text-align: center; text-decoration: none; font-weight: 700; }

        footer { text-align: center; padding: 40px 20px 120px; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <header><img src="ロゴ浮き.png" class="top-logo"></header>
    <div class="container">
        <h1 class="reveal page-title">講師プロフィール</h1>
        <span class="reveal page-sub">地域に寄り添い、共に歩む伴走者として。</span>
        <div class="reveal"><img src="IMG_3616.png" class="profile-img" alt="平松 広大"></div>
        <div class="reveal name-area">
            <span style="font-size: 14px; color: var(--gold); font-weight: 700; letter-spacing: 0.1em;">くらしとお金サロン 代表</span>
            <h2>平松 広大 <span style="font-size: 18px; font-family: 'Noto Sans JP';">(36歳)</span></h2>
        </div>
        <section class="reveal">
            <p>北九州市小倉南区出身。約15年間、飲食業界で200店舗規模の運営やマネジメントを経験。現在は国家資格FP技能士として、地域の皆様の「安心」を中立な立場でサポートしています。</p>
        </section>
        <div class="reveal"><a href="index.html" class="btn-back">トップページへ戻る</a></div>
    </div>
    <a href="https://line.me/R/ti/p/@YOUR_LINE_ID" class="line-float-btn">
        <i class="fa-brands fa-line"></i>
        <span>LINEで無料体験・ご相談</span>
    </a>
    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
