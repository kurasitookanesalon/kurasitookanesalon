<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>講師プロフィール｜くらしとお金サロン</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Noto Sans JP",sans-serif;
  background:#1E5BB8;
  color:#fff;
  padding-bottom:100px;
}

.header{
  text-align:center;
  padding:50px 20px 30px;
}

.header h1{
  font-size:26px;
}

.section{
  padding:50px 20px;
  text-align:center;
}

.card{
  background:#fff;
  color:#1E5BB8;
  border-radius:20px;
  padding:22px;
  margin:15px auto;
  width:90%;
  max-width:500px;
  font-size:16px;
  line-height:1.8;
}

.highlight{
  color:#D4AF37;
  font-weight:bold;
}

.btn{
  display:flex;
  width:90%;
  max-width:420px;
  margin:20px auto;
  background:#00C300;
  color:#fff;
  text-align:center;
  padding:18px;
  border-radius:40px;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
  align-items:center;
  justify-content:center;
  gap:8px;
}
</style>
</head>

<body>

<div class="header">
  <h1>講師プロフィール</h1>
</div>

<div class="section">

  <div class="card">
    はじめまして。<br>
    くらしとお金サロン代表の平松です。
  </div>

  <div class="card">
    私はこれまで<strong class="highlight">15年間、飲食業</strong>に携わり、<br>
    最大<strong class="highlight">約200店舗・6000人以上</strong>の現場に関わってきました。
  </div>

  <div class="card">
    多くの人と関わる中で感じたのは、<br>
    <strong class="highlight">お金の不安を抱えたまま生きている人の多さ</strong>です。
  </div>

  <div class="card">
    正しい知識があれば、防げることはたくさんあります。
  </div>

  <div class="card">
    だからこそ私は、<br>
    増やす知識と守る知恵を学べるこのサロンを立ち上げました。
  </div>

  <div class="card">
    一人で悩まず、地域の仲間と共に学び、支え合える場所をつくること。<br>
    それが私の想いです。
  </div>

</div>

<div class="section">
  <h2>まずは無料体験から</h2>

  <div class="card">
    無理な勧誘は一切ありません。<br>
    安心してご参加ください。
  </div>

  <a href="https://lin.ee/n37s4pB" class="btn">
    無料体験はこちら
  </a>

  <a href="index.html" class="btn" style="background:#555;">
    トップページへ戻る
  </a>
</div>

</body>
</html>
