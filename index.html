<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くらしとお金サロン</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f2f6b;
}

/* ================= トップ ================= */
.hero{
display:flex;
height:100vh;
overflow:hidden;
}

/* 左 */
.hero-left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
background:linear-gradient(135deg,#1E5BB8,#163E7A);
color:#fff;
}

/* 数式 */
.catch-wrap{
max-width:700px;
margin:auto;
}

.row{
display:grid;
grid-template-columns:1fr 60px 1fr;
align-items:center;
margin:12px 0;
font-size:36px;
}

.left{ text-align:right; }
.right{ text-align:left; }
.center{ text-align:center; }

.result{
text-align:center;
font-size:44px;
color:#D4AF37;
font-weight:bold;
margin-top:20px;
}

/* ボタン */
.line-btn{
background:#00c300;
color:#fff;
padding:18px 45px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
margin-top:20px;
}

/* ===== 右スライド修正版 ===== */
.hero-right{
flex:1;
overflow:hidden;
position:relative;
}

.slider{
display:flex;
height:100%;
}

.slide{
width:100%;
height:100%;
object-fit:cover;
flex-shrink:0;
}

/* ================= 不安 ================= */
.problem{
background:#f5f7fb;
padding:80px 20px;
text-align:center;
}

.problem h2{
font-size:28px;
margin-bottom:40px;
}

.problem-card{
background:#fff;
padding:25px;
border-radius:15px;
margin:15px auto;
max-width:600px;
}

/* ================= 数字 ================= */
.impact{
background:#163E7A;
color:#fff;
padding:80px 20px;
text-align:center;
}

.big-number{
font-size:46px;
color:#D4AF37;
font-weight:bold;
margin:10px 0;
}

/* スマホ */
@media (max-width:768px){
.hero{
flex-direction:column;
height:auto;
}

.hero-right{
height:250px;
}

.row{ font-size:24px; }
.result{ font-size:30px; }
}
</style>
</head>

<body>

<div class="hero">

<div class="hero-left">

<div class="catch-wrap">

<div class="row">
<div class="left">増やす知識</div>
<div class="center">×</div>
<div class="right">守る知恵</div>
</div>

<div class="row">
<div class="left"></div>
<div class="center">＋</div>
<div class="right">地域の仲間</div>
</div>

<div class="row">
<div class="left"></div>
<div class="center">＝</div>
<div class="right"></div>
</div>

<div class="result">安心・安定のくらし</div>

</div>

<p>引退世代のためのお金の学校</p>

<a href="#" class="line-btn">無料体験はこちら</a>

</div>

<!-- ===== スライド修正版 ===== -->
<div class="hero-right">
<div class="slider" id="slider">

<img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png" class="slide">
<img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png" class="slide">

</div>
</div>

</div>

<!-- 不安 -->
<section class="problem">
<h2>こんな不安はありませんか？</h2>
<div class="problem-card">老後のお金が不安</div>
<div class="problem-card">投資がよく分からない</div>
<div class="problem-card">詐欺が怖い</div>
</section>

<!-- インパクト -->
<section class="impact">
<h2>知らないだけでこれだけ差が出る</h2>
<p>日本では毎日</p>
<div class="big-number">約200人</div>
<p>孤独死しています</p>

<br>

<p>1件の詐欺被害で</p>
<div class="big-number">5,500万円</div>
<p>失うケースもあります</p>
</section>

<script>
const slider = document.getElementById("slider");
const slides = document.querySelectorAll(".slide");

let index = 0;
const speed = 3000;

/* ⭐ クローン1枚だけ（ここ重要） */
const firstClone = slides[0].cloneNode(true);
slider.appendChild(firstClone);

function moveSlide(){
  index++;
  slider.style.transition = "transform 1s ease";
  slider.style.transform = `translateX(-${index * 100}%)`;

  if(index === slides.length){
    setTimeout(()=>{
      slider.style.transition = "none";
      slider.style.transform = "translateX(0)";
      index = 0;
    },1000);
  }
}

setInterval(moveSlide, speed);
</script>

</body>
</html>
