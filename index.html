<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くらしとお金サロン</title>

<style>
body{
  margin:0;
  font-family:"Hiragino Kaku Gothic ProN", sans-serif;
}

/* ===== ヒーロー ===== */
.hero{
  height:100vh;
  overflow:hidden;
  position:relative;
}

/* ===== 横にそのまま並べて流す ===== */
.track{
  display:flex;
  height:100%;
  animation: flow 80s linear infinite;
}

/* ここが最重要（切れ防止） */
.img{
  height:100%;
  width:auto;        /* ←これで人が切れない */
  flex-shrink:0;
}

/* 無限スクロール */
@keyframes flow{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(-50%); }
}

/* 暗幕 */
.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:1;
}

/* テキスト */
.hero-content{
  position:absolute;
  z-index:2;
  color:white;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
}

.logo{
  width:110px;
  margin-bottom:20px;
}

h1{
  font-size:34px;
  margin:10px 0;
}

.sub{
  margin-bottom:20px;
}

.cta{
  background:#00c300;
  color:white;
  padding:15px 30px;
  border-radius:30px;
  text-decoration:none;
  display:inline-block;
}
</style>
</head>

<body>

<section class="hero">

  <div class="track">

    <!-- 1周目 -->
    <img src="41604837-5C3A-4DF9-B10F-E837EC243D5B.png" class="img">
    <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png" class="img">
    <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png" class="img">
    <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png" class="img">
    <img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png" class="img">
    <img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png" class="img">

    <!-- 2周目（同じ） -->
    <img src="41604837-5C3A-4DF9-B10F-E837EC243D5B.png" class="img">
    <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png" class="img">
    <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png" class="img">
    <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png" class="img">
    <img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png" class="img">
    <img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png" class="img">

  </div>

  <div class="hero-content">
    <img src="ロゴ浮き.png" class="logo">
    <h1>くらしとお金サロン</h1>
    <p class="sub">引退世代のためのお金の学校</p>
    <a href="https://lin.ee/SerNrVa" class="cta">LINEで無料体験</a>
  </div>

</section>

</body>
</html>
