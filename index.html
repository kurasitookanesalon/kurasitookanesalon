<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>くらしとお金サロン | 小倉南校</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --main-blue: #1E5BB8;
            --sub-blue: #163E7A;
            --gold: #D4AF37;
            --red: #E50012;
            --bg-white: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-white);
            color: #222;
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* ヒーロー：人物写真は排除 */
        .hero { padding: 100px 24px 40px; text-align: center; }
        .hero-tag { font-size: 14px; color: var(--main-blue); font-weight: 700; margin-bottom: 20px; }
        .hero-title { font-family: 'Noto Serif JP', serif; font-size: 56px; color: var(--sub-blue); line-height: 1.2; margin: 0; }
        .hero-title span { color: var(--gold); display: block; font-size: 1.1em; }

        /* スライドショー復活 */
        .slideshow-container { width: 100%; overflow: hidden; padding: 40px 0 60px; }
        .slideshow-track { display: flex; width: calc(280px * 8); animation: scroll 25s linear infinite; }
        .slideshow-track img { width: 280px; height: auto; border-radius: 12px; margin: 0 10px; border: 1px solid #eee; }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-280px * 4 - 80px)); }
        }

        /* 料金画像 */
        .price-box { background: var(--main-blue); padding: 40px 0 0; text-align: center; }
        .price-imgs img { width: 100%; max-width: 600px; display: block; margin: 0 auto; border-bottom: 1px solid rgba(255,255,255,0.2); }

        /* アクセス：守恒みらいホールにピン */
        .access { padding: 80px 24px; text-align: center; }
        .map-frame { width: 100%; max-width: 600px; height: 350px; border-radius: 20px; overflow: hidden; border: 5px solid var(--sub-blue); margin: 30px auto; }

        /* QRコード：IMG_2124.png を使用 */
        .qr-section { padding: 60px 24px 140px; text-align: center; background: #f9f9f9; }
        .qr-box { width: 220px; margin: 40px auto; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 12px; }
        .qr-box img { width: 100%; height: auto; display: block; }

        /* LINEボタン */
        .btn-line {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 360px; height: 68px; background: #06C755; color: #fff;
            border-radius: 34px; display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-weight: 700; font-size: 20px; z-index: 5000;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
    </style>
</head>
<body>

<main>
    <section class="hero">
        <div class="hero-tag">増やす知識 × 守る知恵 ＋ 地域の仲間</div>
        <h1 class="hero-title">くらしとお金<br><span>サロン</span></h1>
    </section>

    <div class="slideshow-container">
        <div class="slideshow-track">
            <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png">
            <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png">
            <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png">
            <img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png">
            <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png">
            <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png">
            <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png">
            <img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png">
        </div>
    </div>

    <section class="price-box">
        <div class="price-imgs">
            <img src="IMG_4157.png">
            <img src="IMG_4156.png">
        </div>
    </section>

    <section class="access">
        <p style="font-weight:700; font-size:22px; color:var(--sub-blue); margin:0;">守恒みらいホール</p>
        <p style="font-size:14px; color:#666;">北九州市小倉南区守恒2-1-40</p>
        <div class="map-frame">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3314.417277647248!2d130.87107877626357!3d33.827361773242095!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3543bf42426f0e47%3A0x868427f71b9c1d0!2z5a6I5oGS44G_44KJ44GE44Ob44O844Or!5e0!3m2!1sja!2sjp!4v1713430000000!5m2!1sja!2sjp" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </section>

    <section class="qr-section">
        <h3 style="font-size:24px; color:var(--sub-blue); margin:0;">お問い合わせ</h3>
        <div class="qr-box">
            <img src="IMG_2124.png" alt="LINE公式アカウント">
        </div>
        <p style="font-weight:700;">未来を変える一歩を、ここから。</p>
    </section>
</main>

<a href="https://lin.ee/n37s4pB" class="btn-line">
    <i class="fa-brands fa-line" style="font-size:30px; margin-right:10px;"></i> 無料体験・質問はこちら
</a>

<footer>© くらしとお金サロン All Rights Reserved.</footer>

</body>
</html>
