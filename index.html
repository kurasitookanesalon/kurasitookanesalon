<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>くらしとお金サロン | 小倉南校</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-blue: #1E5BB8; --sub-blue: #163E7A; --gold: #D4AF37; }
        body { margin: 0; font-family: 'Noto Sans JP', sans-serif; line-height: 1.6; background: #fff; }
        
        /* トップエリア：人物写真は入れず、テキストのみで構成 */
        .hero { padding: 80px 20px; text-align: center; background: #fff; }
        .hero-tag { color: var(--main-blue); font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .hero-title { font-family: 'Noto Serif JP', serif; font-size: 48px; color: var(--sub-blue); margin: 0; line-height: 1.2; }
        .hero-title span { color: var(--gold); display: block; }

        /* 料金・比較画像エリア */
        .price-area { background: var(--main-blue); padding: 40px 0; text-align: center; }
        .price-area img { width: 100%; max-width: 600px; display: block; margin: 0 auto; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* アクセス：守恒みらいホールにピンを固定 */
        .access { padding: 60px 20px; text-align: center; }
        .map-frame { width: 100%; max-width: 600px; height: 350px; border: 4px solid var(--sub-blue); border-radius: 15px; margin: 20px auto; overflow: hidden; }

        /* QRコードエリア：2124.png をQRとして表示 */
        .contact-section { padding: 60px 20px 140px; text-align: center; background: #fcfcfc; }
        .qr-container { width: 220px; margin: 30px auto; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 12px; }
        .qr-container img { width: 100%; height: auto; display: block; }

        /* 下部固定LINEボタン */
        .btn-line {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; background: #06C755; color: #fff;
            padding: 20px; border-radius: 40px; text-decoration: none; font-weight: bold; font-size: 20px;
            display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-tag">増やす知識 × 守る知恵 ＋ 地域の仲間</div>
    <h1 class="hero-title">くらしとお金<span>サロン</span></h1>
</section>

<section class="price-area">
    <img src="IMG_4157.png" alt="比較表1">
    <img src="IMG_4156.png" alt="比較表2">
</section>

<section class="access">
    <h2 style="color:var(--sub-blue); font-family: 'Noto Serif JP', serif;">Access</h2>
    <p style="font-size:18px;"><strong>守恒みらいホール</strong><br><span style="font-size:14px; color:#666;">北九州市小倉南区守恒2-1-40</span></p>
    <div class="map-frame">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3314.2831548817293!2d130.88046187642636!3d33.83078422935272!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3543c75628990397%3A0x6334584405380598!2z5a6I5oGS44G_44KJ44GE44Ob44O844Or!5e0!3m2!1sja!2sjp!4v1713430000000!5m2!1sja!2sjp" 
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
        </iframe>
    </div>
</section>

<section class="contact-section">
    <h3 style="font-size:24px; color:var(--sub-blue); margin-bottom:10px;">お問い合わせ</h3>
    <div class="qr-container">
        <img src="IMG_2124.png" alt="LINE公式アカウントQR">
    </div>
    <p style="font-weight:bold;">未来を変える一歩を、ここから。</p>
</section>

<a href="https://lin.ee/n37s4pB" class="btn-line">
    <i class="fa-brands fa-line" style="font-size:28px; margin-right:12px;"></i> 無料体験・質問はこちら
</a>

<footer style="text-align:center; padding:20px; color:#999; font-size:12px;">
    © くらしとお金サロン All Rights Reserved.
</footer>

</body>
</html>
