<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body{
  margin:0;
  padding:0;
  font-family:"Hiragino Kaku Gothic ProN", sans-serif;

  /* 背景チェック用 */
  background:url('92F216BD-DBCB-44E4-93A1-2E045A576A8F.png');
  background-size:100% auto;
  background-repeat:no-repeat;
  background-position:top center;
}

/* ヒーロー */
.hero{
  height:100vh;
  overflow:hidden;
  position:relative;
}

.track{
  display:flex;
  width:max-content;
  height:100%;
  animation: flow 50s linear infinite;
}

.img{
  height:100%;
  width:auto;
}

@keyframes flow{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(-50%); }
}

/* 黒幕 */
.track::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
}

/* ダミーセクション */
section{
  padding:100px 20px;
}

/* 白カード */
.box{
  background:rgba(255,255,255,0.9);
  padding:40px;
  border-radius:12px;
  max-width:700px;
  margin:auto;
  text-align:center;
}
</style>
</head>

<body>

<!-- トップ -->
<section class="hero">
  <div class="track">

    <!-- 画像 -->
    <img src="41604837-5C3A-4DF9-B10F-E837EC243D5B.png" class="img">
    <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png" class="img">
    <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png" class="img">
    <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png" class="img">
    <img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png" class="img">
    <img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png" class="img">

    <!-- ループ -->
    <img src="41604837-5C3A-4DF9-B10F-E837EC243D5B.png" class="img">
    <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png" class="img">
    <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png" class="img">
    <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png" class="img">
    <img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png" class="img">
    <img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png" class="img">

  </div>
</section>

<!-- ダミー -->
<section>
  <div class="box">テスト1</div>
</section>

<section>
  <div class="box">テスト2</div>
</section>

<section>
  <div class="box">テスト3</div>
</section>

</body>
</html>
