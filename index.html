<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くらしとお金サロン</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f2f6b;
}

/* ================= トップ ================= */
.hero{
display:flex;
height:100vh;
}

.hero-left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
background:linear-gradient(135deg,#1E5BB8,#163E7A);
color:#fff;
}

.catch-wrap{
max-width:700px;
margin:auto;
}

.row{
display:grid;
grid-template-columns:1fr 60px 1fr;
align-items:center;
margin:12px 0;
font-size:36px;
}

.left{ text-align:right; }
.right{ text-align:left; }
.center{ text-align:center; }

.result{
text-align:center;
font-size:44px;
color:#D4AF37;
font-weight:bold;
margin-top:20px;
}

.hero-left p{
margin:20px 0;
}

.line-btn{
background:#00c300;
color:#fff;
padding:18px 45px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

/* 右画像（1枚に変更） */
.hero-right{
flex:1;
}

.hero-right img{
width:100%;
height:100%;
object-fit:cover;
}

/* ================= 不安 ================= */
.problem{
background:#f5f7fb;
padding:80px 20px;
text-align:center;
}

.problem h2{
font-size:28px;
margin-bottom:40px;
}

.problem-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
max-width:900px;
margin:auto;
}

.problem-card{
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.problem img{
width:100%;
max-width:700px;
margin-top:40px;
border-radius:20px;
}

/* ================= 解決 ================= */
.solution{
padding:80px 20px;
text-align:center;
background:#fff;
}

.solution-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
max-width:900px;
margin:auto;
}

.solution-card{
background:#f5f7fb;
padding:30px;
border-radius:20px;
}

/* ================= インパクト数字 ================= */
.impact{
background:#163E7A;
color:#fff;
padding:80px 20px;
text-align:center;
}

.impact h2{
font-size:28px;
margin-bottom:40px;
}

.impact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
max-width:900px;
margin:auto;
}

.impact-card{
background:rgba(255,255,255,0.1);
padding:40px 20px;
border-radius:20px;
}

.big-number{
font-size:42px;
font-weight:bold;
color:#D4AF37;
margin:10px 0;
}

/* スマホ */
@media (max-width:768px){
.hero{
flex-direction:column;
height:auto;
}

.hero-right{
height:250px;
}

.problem-grid,
.solution-grid,
.impact-grid{
grid-template-columns:1fr;
}

.row{ font-size:24px; }
.result{ font-size:30px; }
}
</style>
</head>

<body>

<!-- トップ -->
<div class="hero">

<div class="hero-left">

<div class="catch-wrap">
<div class="row">
<div class="left">増やす知識</div>
<div class="center">×</div>
<div class="right">守る知恵</div>
</div>

<div class="row">
<div class="left"></div>
<div class="center">＋</div>
<div class="right">地域の仲間</div>
</div>

<div class="row">
<div class="left"></div>
<div class="center">＝</div>
<div class="right"></div>
</div>

<div class="result">安心・安定のくらし</div>
</div>

<p>
引退世代のためのお金の学校<br>
NISA・株式投資・詐欺対策まで学べます
</p>

<a href="#" class="line-btn">無料体験はこちら</a>

</div>

<div class="hero-right">
<img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png">
</div>

</div>

<!-- 不安 -->
<section class="problem">

<h2>こんな不安はありませんか？</h2>

<div class="problem-grid">
<div class="problem-card">老後のお金が不安</div>
<div class="problem-card">投資がよく分からない</div>
<div class="problem-card">詐欺が怖い</div>
</div>

<img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png">

</section>

<!-- 解決 -->
<section class="solution">

<h2>このサロンで得られること</h2>

<div class="solution-grid">
<div class="solution-card">投資を基礎から学べる</div>
<div class="solution-card">詐欺や損失を防ぐ</div>
<div class="solution-card">安心して相談できる</div>
</div>

</section>

<!-- インパクト -->
<section class="impact">

<h2>知らないだけでこれだけ差が出る</h2>

<div class="impact-grid">

<div class="impact-card">
1日あたり<br>
<div class="big-number">約200人</div>
孤独死
</div>

<div class="impact-card">
1件の詐欺被害<br>
<div class="big-number">5,500万円</div>
失うケースも
</div>

</div>

</section>

</body>
</html>
