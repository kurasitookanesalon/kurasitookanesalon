<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>くらしとお金サロン | 小倉南校</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
  --app-bg: #F5F5F7;
  --app-black: #1D1D1F;
  --app-gray: #86868B;
  --app-blue: #0066CC;
  --deep-navy: #010103;
  --premium-gold: #BF9B30;
  --alert-red: #D70015;
}

html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; scroll-behavior: smooth; }
* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body {
  font-family: "SF Pro Display", "Noto Sans JP", sans-serif;
  background-color: #FFF;
  color: var(--app-black);
  line-height: 1.6;
}

.reveal { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
.reveal.active { opacity: 1; transform: translateY(0); }

header {
  height: 52px; background: rgba(255, 255, 255, 0.85);
  backdrop-filter: saturate(180%) blur(20px);
  display: flex; align-items: center; padding: 0 20px;
  position: sticky; top: 0; z-index: 9999;
  border-bottom: 0.5px solid rgba(0,0,0,0.08);
}
.header-logo { height: 28px; width: 28px; margin-right: 12px; }
.header-name { font-size: 13px; font-weight: 700; }

section { width: 100%; padding: 80px 24px; }

/* SLIDER */
.slider-container { padding-bottom: 60px; overflow: hidden; }
.slider { display: flex; overflow-x: auto; padding: 0 20px; gap: 15px; -webkit-overflow-scrolling: touch; }
.slider::-webkit-scrollbar { display: none; }
.slider img { width: 85vw; flex-shrink: 0; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: #f0f0f0; min-height: 200px; }

/* ACCESS */
.section-access { padding: 80px 0 0; background: #FFF; text-align: center; }
.access-header { padding: 0 24px; margin-bottom: 40px; }
.access-title { font-family: 'Noto Serif JP', serif; font-size: 32px; margin-bottom: 10px; }
.map-wrap { width: 100%; height: 400px; background: #eee; border: none; }

/* FOOTER / QR Code */
.section-footer { padding: 100px 24px 200px; text-align: center; background: var(--app-bg); border-radius: 48px 48px 0 0; }
.qr-container { 
    background: #FFF; display: inline-block; padding: 15px; 
    border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    margin-bottom: 24px;
}
.qr-code { width: 140px; height: 140px; display: block; }

.line-btn {
  position: fixed; bottom: 25px; left: 20px; right: 20px;
  background: #00C300; color: #FFF; height: 64px; border-radius: 32px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 18px; text-decoration: none;
  z-index: 99999; box-shadow: 0 12px 30px rgba(0,195,0,0.3);
}
</style>
</head>
<body>

<header>
  <img src="ロゴ浮き.png" class="header-logo" alt="">
  <span class="header-name">くらしとお金サロン（小倉南校）</span>
</header>

<main>
  <section style="text-align:center; padding-top:120px;">
    <div class="reveal">
      <span style="color:var(--app-blue); font-weight:600;">その一歩が、一生の安心になる。</span>
      <h1 style="font-family:'Noto Serif JP',serif; font-size:2rem; margin:20px 0;">自分と家族を、守り抜く知恵。<br><strong style="color:var(--premium-gold); font-size:2.6rem;">安心・安定のくらし</strong></h1>
    </div>
  </section>

  <div class="slider-container reveal">
    <div class="slider">
      <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png" alt="">
      <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png" alt="">
      <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png" alt="">
    </div>
  </div>

  <section class="section-access reveal">
    <div class="access-header">
      <h2 class="access-title">Access</h2>
      <p style="font-weight: 700;">守恒みらいホール</p>
      <p style="color: var(--app-gray); font-size: 14px;">北九州市小倉南区守恒2丁目1-40</p>
    </div>
    <iframe class="map-wrap" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3314.542284949219!2d130.8808115!3d33.8241315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3543bf42022b724f%3A0xc6999c085b46e968!2z5a6I5oGS44G_44KJ44GE44Ob44O844Or!5e0!3m2!1sja!2sjp!4v1713426000000!5m2!1sja!2sjp" allowfullscreen="" loading="lazy"></iframe>
  </section>

  <section class="section-footer reveal">
    <h2 style="font-family: 'Noto Serif JP', serif; font-size: 28px; margin-bottom: 40px;">その一歩で、未来は変わる。</h2>
    
    <div class="qr-container">
      <img src="IMG_2124.png" class="qr-code" alt="LINE QR">
    </div>
    
    <p style="font-weight: 700; margin-bottom: 5px;">まずはLINEで無料体験予約を</p>
    <p style="color: var(--app-gray); font-size: 14px;">QRコードをスキャン、または下のボタンから</p>
  </section>
</main>

<a href="https://lin.ee/n37s4pB" class="line-btn">
  <i class="fa-brands fa-line"></i>
  無料体験・質問はこちら
</a>

<script>
  window.addEventListener('load', () => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('active'); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  });
</script>

</body>
</html>
