<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body{
  margin:0;
  padding:0;
  font-family:"Hiragino Kaku Gothic ProN", sans-serif;
}

/* ===== トップ（背景なし） ===== */
.hero{
  height:100vh;
  background:#000; /* 仮 */
}

/* ===== 背景セクション（ここが修正済み） ===== */
.bg-section{
  padding:120px 20px;

  background:url('92F216BD-DBCB-44E4-93A1-2E045A576A8F.png');
  background-size:100% 100%;   /* ←ズームなし＆1枚固定 */
  background-repeat:no-repeat; /* ←繰り返さない */
  background-position:center;
}

/* 白カード */
.box{
  background:rgba(255,255,255,0.9);
  padding:40px;
  border-radius:12px;
  max-width:700px;
  margin:auto;
  text-align:center;
  font-size:22px;
}
</style>
</head>

<body>

<!-- トップ -->
<section class="hero"></section>

<!-- 背景テスト -->
<section class="bg-section">
  <div class="box">テスト1</div>
</section>

<section class="bg-section">
  <div class="box">テスト2</div>
</section>

<section class="bg-section">
  <div class="box">テスト3</div>
</section>

</body>
</html>
