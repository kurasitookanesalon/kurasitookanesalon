<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くらしとお金サロン</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f2f6b;
}

/* ================= トップ ================= */
.hero{
display:flex;
height:100vh;
overflow:hidden;
}

.hero-left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
background:linear-gradient(135deg,#1E5BB8,#163E7A);
color:#fff;
}

/* 数式デザイン */
.catch-wrap{
max-width:700px;
margin:auto;
}

.row{
display:grid;
grid-template-columns:1fr 60px 1fr;
align-items:center;
margin:12px 0;
font-size:36px;
}

.left{ text-align:right; padding-right:10px; }
.right{ text-align:left; padding-left:10px; }
.center{ text-align:center; font-size:32px; }

.result{
text-align:center;
font-size:44px;
color:#D4AF37;
font-weight:bold;
margin-top:20px;
}

/* 説明 */
.hero-left p{
font-size:16px;
line-height:1.8;
margin:25px 0;
text-align:center;
}

/* ボタン */
.line-btn{
background:#00c300;
color:#fff;
padding:18px 45px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

/* スライド */
.hero-right{
flex:1;
overflow:hidden;
}

.slider{
display:flex;
height:100%;
}

.slider img{
height:100%;
width:auto;
flex-shrink:0;
}

.slider.moving{
animation:slideX linear infinite;
}

/* ================= 不安 ================= */
.problem{
background:#f5f7fb;
padding:80px 20px;
}

.problem-inner{
max-width:1000px;
margin:auto;
text-align:center;
}

.problem h2{
font-size:28px;
margin-bottom:40px;
}

.problem-wrap{
display:flex;
gap:30px;
align-items:center;
margin-bottom:40px;
}

.problem-image img{
width:100%;
border-radius:20px;
}

.problem-content{
display:flex;
flex-direction:column;
gap:20px;
}

.problem-card{
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:left;
}

/* メッセージ */
.problem-message{
font-size:18px;
}

.problem-message span{
display:block;
font-size:22px;
font-weight:bold;
margin-top:10px;
color:#1E5BB8;
}

/* ================= 解決 ================= */
.solution{
background:#fff;
padding:80px 20px;
text-align:center;
}

.solution h2{
font-size:28px;
margin-bottom:40px;
color:#1E5BB8;
}

.solution-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:25px;
max-width:1000px;
margin:auto;
}

.solution-card{
background:#f5f7fb;
padding:30px;
border-radius:20px;
}

.solution-card h3{
color:#1E5BB8;
}

/* ================= 信頼（追加） ================= */
.trust{
background:#163E7A;
color:#fff;
padding:80px 20px;
text-align:center;
}

.trust h2{
font-size:28px;
margin-bottom:40px;
}

.trust-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
max-width:900px;
margin:auto;
}

.trust-card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
font-size:18px;
}

/* ================= スマホ ================= */
@media (max-width:768px){

.hero{
flex-direction:column;
height:auto;
}

.hero-right{
height:250px;
}

.row{ font-size:24px; }
.result{ font-size:30px; }

.problem-wrap{
flex-direction:column;
}

.solution-grid,
.trust-grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<!-- ================= トップ ================= -->
<div class="hero">

<div class="hero-left">

<div class="catch-wrap">

<div class="row">
<div class="left">増やす知識</div>
<div class="center">×</div>
<div class="right">守る知恵</div>
</div>

<div class="row">
<div class="left"></div>
<div class="center">＋</div>
<div class="right">地域の仲間</div>
</div>

<div class="row">
<div class="left"></div>
<div class="center">＝</div>
<div class="right"></div>
</div>

<div class="result">安心・安定のくらし</div>

</div>

<p>
引退世代のためのお金の学校<br>
NISA・株式投資・詐欺対策まで学べます
</p>

<a href="https://lin.ee/yxZwj10" class="line-btn">
無料体験はこちら
</a>

</div>

<div class="hero-right">
<div class="slider" id="slider">
<img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png">
<img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png">
<img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png">
<img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png">
<img src="41604837-5C3A-4DF9-B10F-E837EC243D5B.png">
<img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png">
</div>
</div>

</div>

<!-- ================= 不安 ================= -->
<section class="problem">

<div class="problem-inner">

<h2>こんな不安はありませんか？</h2>

<div class="problem-wrap">

<div class="problem-image">
<img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png">
</div>

<div class="problem-content">
<div class="problem-card">老後のお金が不安</div>
<div class="problem-card">投資がよく分からない</div>
<div class="problem-card">詐欺が怖い</div>
</div>

</div>

<div class="problem-message">
その不安、<br>
<span>正しい知識で解決できます</span>
</div>

</div>

</section>

<!-- ================= 解決 ================= -->
<section class="solution">

<h2>このサロンで得られること</h2>

<div class="solution-grid">

<div class="solution-card">
<h3>増やす力</h3>
<p>投資を基礎から学べる</p>
</div>

<div class="solution-card">
<h3>守る知恵</h3>
<p>詐欺や損失を防ぐ</p>
</div>

<div class="solution-card">
<h3>地域のつながり</h3>
<p>安心して相談できる</p>
</div>

</div>

</section>

<!-- ================= 信頼 ================= -->
<section class="trust">

<h2>知っているか知らないかで差が出る時代</h2>

<div class="trust-grid">

<div class="trust-card">
詐欺被害<br><strong>最大5,500万円</strong>
</div>

<div class="trust-card">
孤独死<br><strong>年間約7万人</strong>
</div>

<div class="trust-card">
金融知識の差で<br><strong>大きな差が生まれる</strong>
</div>

</div>

</section>

<!-- ================= JS ================= -->
<script>
const slider = document.getElementById("slider");
slider.innerHTML += slider.innerHTML;

const totalWidth = slider.scrollWidth / 2;
const speed = 80;
const duration = totalWidth / speed;

const style = document.createElement("style");
style.innerHTML = `
@keyframes slideX {
0% { transform: translateX(0); }
100% { transform: translateX(-${totalWidth}px); }
}
#slider.moving {
animation-duration: ${duration}s;
}
`;
document.head.appendChild(style);

slider.classList.add("moving");
</script>

</body>
</html>
