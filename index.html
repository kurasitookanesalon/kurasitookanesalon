<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くらしとお金サロン</title>

<style>
body{
margin:0;
background:url("92F216BD-DBCB-44E4-93A1-2E045A576A8F.png") no-repeat center;
background-size:cover;
background-attachment:fixed;
}

/* ===== トップ ===== */
.hero{
position:relative;
height:100vh;
overflow:hidden;
}

/* スライド */
.hero-slider{
position:absolute;
width:100%;
height:100%;
}

.hero-slider img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
object-position:center 30%; /* ←ここ重要 */
opacity:0;
animation:fade 24s infinite;
}

/* 6枚タイミング */
.hero-slider img:nth-child(1){animation-delay:0s;}
.hero-slider img:nth-child(2){animation-delay:4s;}
.hero-slider img:nth-child(3){animation-delay:8s;}
.hero-slider img:nth-child(4){animation-delay:12s;}
.hero-slider img:nth-child(5){animation-delay:16s;}
.hero-slider img:nth-child(6){animation-delay:20s;}

@keyframes fade{
0%{opacity:0;}
5%{opacity:1;}
15%{opacity:1;}
20%{opacity:0;}
100%{opacity:0;}
}

/* 暗さ */
.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.2);
}

/* テキスト */
.hero-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:#fff;
z-index:2;
}

.hero-content img{
width:120px;
margin-bottom:20px;
}

.hero h1{
font-size:32px;
margin:10px 0;
}

.line-btn{
background:#00c300;
color:#fff;
padding:15px 30px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="hero">

<div class="hero-slider">
<img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png">
<img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png">
<img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png">
<img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png">
<img src="41604837-5C3A-4DF9-B10F-E837EC243D5B.png">
<img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png">
</div>

<div class="hero-content">
<img src="ロゴ浮き.png">
<h1>くらしとお金サロン</h1>
<p>引退世代のためのお金の学校</p>
<a href="https://lin.ee/yxZwj10" class="line-btn">LINEで無料体験</a>
</div>

</div>

</body>
</html>
