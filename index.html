<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くらしとお金サロン</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f2f6b;
}

/* ================= トップ ================= */
.hero{
display:flex;
height:100vh;
overflow:hidden;
}

.hero-left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
background:linear-gradient(135deg,#1E5BB8,#163E7A);
color:#fff;
text-align:center;
}

/* キャッチ */
.catch-wrap{
text-align:center;
}

.catch-line{
font-size:36px;
line-height:1.8;
margin:10px 0;
}

.symbol{
font-size:32px;
margin:10px 0;
}

.result{
font-size:44px;
color:#D4AF37;
font-weight:bold;
margin-top:15px;
}

/* 説明 */
.hero-left p{
font-size:16px;
line-height:1.8;
margin:25px 0;
}

/* ボタン */
.line-btn{
background:#00c300;
color:#fff;
padding:18px 45px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

/* スライド */
.hero-right{
flex:1;
overflow:hidden;
}

.slider{
display:flex;
height:100%;
}

.slider img{
height:100%;
width:auto;
flex-shrink:0;
}

.slider.moving{
animation:slideX linear infinite;
}

/* ================= 不安 ================= */
.problem{
background:#f5f7fb;
padding:80px 20px;
}

.problem-inner{
max-width:1000px;
margin:auto;
text-align:center;
}

.problem h2{
font-size:28px;
margin-bottom:40px;
}

.problem-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:25px;
margin-bottom:40px;
}

.problem-card{
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
font-size:15px;
line-height:1.7;
}

.problem-message{
font-size:18px;
line-height:1.8;
}

.problem-message span{
display:block;
font-size:22px;
font-weight:bold;
margin-top:10px;
color:#1E5BB8;
}

/* ================= 解決 ================= */
.solution{
background:#fff;
padding:80px 20px;
}

.solution-inner{
max-width:1000px;
margin:auto;
text-align:center;
}

.solution h2{
font-size:28px;
margin-bottom:40px;
color:#1E5BB8;
}

.solution-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:25px;
margin-bottom:50px;
}

.solution-card{
background:#f5f7fb;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.solution-card h3{
font-size:20px;
margin-bottom:15px;
color:#1E5BB8;
}

.solution-card p{
font-size:15px;
line-height:1.7;
}

.solution-message{
font-size:18px;
line-height:1.8;
}

.solution-message span{
display:block;
font-size:22px;
font-weight:bold;
margin-top:10px;
color:#D4AF37;
}

/* ================= スマホ ================= */
@media (max-width:768px){
.hero{
flex-direction:column;
height:auto;
}

.catch-line{
font-size:26px;
}

.result{
font-size:32px;
}

.hero-right{
height:250px;
}

.problem-grid,
.solution-grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<!-- ================= トップ ================= -->
<div class="hero">

<div class="hero-left">

<div class="catch-wrap">
<div class="catch-line">増やす知識 × 守る知恵</div>
<div class="symbol">＋</div>
<div class="catch-line">地域の仲間</div>
<div class="symbol">＝</div>
<div class="result">安心・安定のくらし</div>
</div>

<p>
引退世代のためのお金の学校<br>
NISA・株式投資・詐欺対策まで学べます
</p>

<a href="https://lin.ee/yxZwj10" class="line-btn">
無料体験はこちら
</a>

</div>

<div class="hero-right">
<div class="slider" id="slider">
<img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png">
<img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png">
<img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png">
<img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png">
<img src="41604837-5C3A-4DF9-B10F-E837EC243D5B.png">
<img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png">
</div>
</div>

</div>

<!-- ================= 不安 ================= -->
<section class="problem">

<div class="problem-inner">

<h2>こんな不安はありませんか？</h2>

<div class="problem-grid">

<div class="problem-card">
老後のお金がこのままで大丈夫か不安
</div>

<div class="problem-card">
NISAや投資をよく分からないまま始めている
</div>

<div class="problem-card">
詐欺や騙されるのが怖い
</div>

</div>

<div class="problem-message">
その不安、<br>
<span>正しい知識で解決できます</span>
</div>

</div>

</section>

<!-- ================= 解決 ================= -->
<section class="solution">

<div class="solution-inner">

<h2>このサロンで得られること</h2>

<div class="solution-grid">

<div class="solution-card">
<h3>増やす力</h3>
<p>NISA・株式投資を基礎から学べる</p>
</div>

<div class="solution-card">
<h3>守る知恵</h3>
<p>詐欺や損失を防ぐ判断力が身につく</p>
</div>

<div class="solution-card">
<h3>地域のつながり</h3>
<p>同世代と学び安心して相談できる</p>
</div>

</div>

<div class="solution-message">
知識がある人だけが守れる時代です<br>
<span>今からでも遅くありません</span>
</div>

</div>

</section>

<!-- ================= JS ================= -->
<script>
const slider = document.getElementById("slider");
slider.innerHTML += slider.innerHTML;

const totalWidth = slider.scrollWidth / 2;
const speed = 80;
const duration = totalWidth / speed;

const style = document.createElement("style");
style.innerHTML = `
@keyframes slideX {
0% { transform: translateX(0); }
100% { transform: translateX(-${totalWidth}px); }
}
#slider.moving {
animation-duration: ${duration}s;
}
`;
document.head.appendChild(style);

slider.classList.add("moving");
</script>

</body>
</html>
