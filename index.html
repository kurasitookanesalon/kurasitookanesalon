<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くらしとお金サロン 小倉南校</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Noto Sans JP",sans-serif;
  background:#1E5BB8;
  color:#fff;
  padding-bottom:100px;
}

.hero{
  text-align:center;
  padding:60px 20px 40px;
}

.hero-header{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}

.hero-header img{
  width:50px;
  position:absolute;
  left:10px;
}

.hero-title{
  font-size:28px;
  font-weight:bold;
  text-align:center;
  width:100%;
}

.formula{
  font-size:22px;
  line-height:1.8;
}

.formula strong{
  display:block;
  font-size:42px;
  color:#D4AF37;
  margin-top:15px;
}

.btn{
  display:flex;
  width:90%;
  max-width:420px;
  margin:25px auto 10px;
  background:#00C300;
  color:#fff;
  text-align:center;
  padding:18px;
  border-radius:40px;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.note{
  font-size:12px;
  opacity:0.9;
  text-align:center;
}

.slider{
  width:100%;
  overflow:hidden;
  margin-top:30px;
}

.slide-track{
  display:flex;
}

.slide-track img{
  width:100vw;
  height:50vw;
  max-height:400px;
  object-fit:cover;
  flex-shrink:0;
}

.section{
  padding:60px 20px;
  text-align:center;
}

.section h2{
  font-size:28px;
  margin-bottom:30px;
}

.card{
  background:#fff;
  color:#D4AF37;
  border-radius:20px;
  padding:22px;
  margin:15px auto;
  width:90%;
  max-width:500px;
  font-size:22px;
  font-weight:bold;
  line-height:1.6;
}

.compare{
  display:flex;
  text-align:center;
}

.compare div{
  width:50%;
  padding:20px;
}

.compare div:first-child{
  border-right:1px solid #ddd;
}

.compare-title{
  font-size:16px;
  margin-bottom:10px;
  color:#1E5BB8;
  font-weight:bold;
}

.compare-bottom{
  padding:15px;
  border-top:1px solid #ddd;
  font-size:16px;
  text-align:center;
}

.notion-btn{
  display:block;
  width:90%;
  max-width:500px;
  margin:22px auto;
  padding:26px;
  border-radius:20px;
  text-align:center;
  text-decoration:none;
  background:linear-gradient(180deg,#ffffff 0%,#f0f3f8 100%);
  color:#1E5BB8;
  border:3px solid #1E5BB8;
  box-shadow:0 6px 0 #163E7A,0 16px 30px rgba(0,0,0,0.45);
  font-size:24px;
  font-weight:bold;
  line-height:1.4;
  opacity:0;
  transform:translateY(60px);
  transition:0.6s;
}

.notion-btn.show{
  opacity:1;
  transform:translateY(0);
}

.floating-btn{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:420px;
  background:#00C300;
  color:#fff;
  padding:16px;
  border-radius:50px;
  font-size:17px;
  font-weight:bold;
  text-decoration:none;
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  animation:floaty 2.5s ease-in-out infinite,
             pulse 2.5s ease-in-out infinite;
}

@keyframes floaty{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(-6px);}
}

@keyframes pulse{
  0%,100%{box-shadow:0 8px 20px rgba(0,0,0,0.25);}
  50%{box-shadow:0 12px 30px rgba(0,0,0,0.4);}
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-header">
    <img src="ロゴ浮き.png">
    <div class="hero-title">
      くらしとお金サロン<br>
      <span style="font-size:18px;">（小倉南校）</span>
    </div>
  </div>

  <div class="formula">
    増やす知識 × 守る知恵 ＋ 地域の仲間 ＝
    <strong>安心・安定のくらし</strong>
  </div>

  <a href="https://lin.ee/n37s4pB" class="btn" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" style="width:22px;">
    まずは無料体験の詳細を見る
  </a>

  <div class="note">
    まずは無料体験で、雰囲気をご確認ください
  </div>
</div>

<div class="slider">
  <div class="slide-track" id="slideTrack">
    <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png">
    <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png">
    <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png">
    <img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png">
    <img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png">
  </div>
</div>

<div class="section">
  <h2>料金について</h2>

  <div class="card">
    月額 22,000円<br>
    （週1回＋相談し放題）
  </div>

  <!-- 🔥比較カード -->
  <div class="card" style="padding:0; overflow:hidden;">
    <div class="compare">

      <div>
        <div class="compare-title">一般的な習い事</div>
        <div>月11,000円前後</div>
        <div>週1回（約4時間）</div>
      </div>

      <div>
        <div class="compare-title">くらしとお金サロン</div>
        <div>月22,000円</div>
        <div>週1回（約8時間）</div>
        <div>＋LINE相談</div>
        <div>＋地域コミュニティ</div>
      </div>

    </div>

    <div class="compare-bottom">
      時間あたりの負担は大きく変わりません
    </div>
  </div>

  <div class="card">
    1回あたり約5,500円。<br>
    いつでも相談できる環境です
  </div>
</div>

<a href="https://lin.ee/n37s4pB" class="floating-btn" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" style="width:22px;">
  無料体験の参加・ご質問はこちら
</a>

<script>
const track=document.getElementById("slideTrack");
track.innerHTML+=track.innerHTML;
let x=0;
function slide(){
  x+=0.6;
  if(x>=track.scrollWidth/2){x=0;}
  track.style.transform=`translateX(-${x}px)`;
  requestAnimationFrame(slide);
}
slide();
</script>

</body>
</html>
