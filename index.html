<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くらしとお金サロン 小倉南校</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Noto Sans JP",sans-serif;
  background:#1E5BB8;
  color:#fff;
  padding-bottom:100px;
}

.hero{
  text-align:center;
  padding:60px 20px 40px;
}

.hero-header{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}

.hero-header img{
  width:50px;
  position:absolute;
  left:10px;
}

.hero-title{
  font-size:28px;
  font-weight:bold;
  text-align:center;
  width:100%;
}

.formula{
  font-size:22px;
  line-height:1.8;
}

.formula strong{
  display:block;
  font-size:42px;
  color:#D4AF37;
  margin-top:15px;
}

.btn{
  display:flex;
  width:90%;
  max-width:420px;
  margin:25px auto 10px;
  background:#00C300;
  color:#fff;
  text-align:center;
  padding:18px;
  border-radius:40px;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.note{
  font-size:12px;
  opacity:0.9;
  text-align:center;
}

.slider{
  width:100%;
  overflow:hidden;
  margin-top:30px;
}

.slide-track{
  display:flex;
}

.slide-track img{
  width:100vw;
  height:50vw;
  max-height:400px;
  object-fit:cover;
  flex-shrink:0;
}

.section{
  padding:60px 20px;
  text-align:left;
}

.section h2{
  font-size:28px;
  margin-bottom:30px;
  text-align:center;
}

.card{
  background:#fff;
  color:#D4AF37;
  border-radius:20px;
  padding:22px;
  margin:15px auto;
  width:90%;
  max-width:500px;
  font-size:22px;
  font-weight:bold;
  line-height:1.6;

  text-align:left;

  word-break:keep-all;
  line-break:strict;
  overflow-wrap:break-word;
}

/* 固定 */
.nowrap{
  white-space:nowrap;
}

.compare-img{
  width:90%;
  max-width:500px;
  margin:20px auto;
  display:block;
  border-radius:20px;
}

.notion-btn{
  display:block;
  width:90%;
  max-width:500px;
  margin:22px auto;
  padding:26px;
  border-radius:20px;
  text-align:center;
  text-decoration:none;
  background:linear-gradient(180deg,#ffffff 0%,#f0f3f8 100%);
  color:#1E5BB8;
  border:3px solid #1E5BB8;
  box-shadow:0 6px 0 #163E7A,0 16px 30px rgba(0,0,0,0.45);
  font-size:24px;
  font-weight:bold;
  line-height:1.4;
  opacity:0;
  transform:translateY(60px);
  transition:0.6s;
}

.notion-btn.show{
  opacity:1;
  transform:translateY(0);
}

.floating-btn{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:420px;
  background:#00C300;
  color:#fff;
  padding:16px;
  border-radius:50px;
  font-size:17px;
  font-weight:bold;
  text-decoration:none;
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  animation:floaty 2.5s ease-in-out infinite,
             pulse 2.5s ease-in-out infinite;
}

@keyframes floaty{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(-6px);}
}

@keyframes pulse{
  0%,100%{box-shadow:0 8px 20px rgba(0,0,0,0.25);}
  50%{box-shadow:0 12px 30px rgba(0,0,0,0.4);}
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-header">
    <img src="ロゴ浮き.png">
    <div class="hero-title">
      くらしとお金サロン
      <span style="font-size:18px;">（小倉南校）</span>
    </div>
  </div>

  <div class="formula">
    増やす知識 × 守る知恵 ＋ 地域の仲間 ＝
    <strong>安心・安定のくらし</strong>
  </div>

  <a href="https://lin.ee/n37s4pB" class="btn" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" style="width:22px;">
    まずは内容を見てみる
  </a>

  <div class="note">
    まずは無料体験で、雰囲気をご確認ください
  </div>
</div>

<div class="section">
  <h2>知らないだけでこんな現実が起きています</h2>
  <div class="card">詐欺被害は毎日 <span class="nowrap">約50件</span>、<span class="nowrap">約1.2億円</span></div>
  <div class="card">認知症診断は、毎日 <span class="nowrap">約800人</span></div>
  <div class="card">相続トラブルで裁判 毎日 <span class="nowrap">約30件</span></div>
</div>

<div class="section">
  <h2>料金について</h2>

  <div class="card">
    月額 <span class="nowrap">22,000円</span>（週1回＋相談し放題）
  </div>

  <div class="card">
    1回あたり約<span class="nowrap">5,500円</span>。いつでも相談できる環境です
  </div>
</div>

<a href="https://lin.ee/n37s4pB" class="floating-btn" target="_blank">
  友だち追加して無料体験・質問もこちら
</a>

</body>
</html>
