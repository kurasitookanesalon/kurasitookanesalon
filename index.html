<style>
body{
  margin:0;
  font-family:"Noto Sans JP",sans-serif;
  background:#1E5BB8;
  color:#fff;
  padding-bottom:100px;
}

/* ===== トップ ===== */
.hero{
  text-align:center;
  padding:60px 20px 40px;
}

.hero-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.hero-header img{
  width:50px;
}

.hero-title{
  font-size:28px;
  font-weight:bold;
}

.formula{
  font-size:22px;
  line-height:1.8;
}

.formula strong{
  display:block;
  font-size:42px;
  color:#D4AF37;
  margin-top:15px;
}

/* ===== 上ボタン ===== */
.btn{
  display:block;
  width:90%;
  max-width:420px;
  margin:25px auto 10px;
  background:#00C300;
  color:#fff;
  text-align:center;
  padding:18px;
  border-radius:40px;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
}

.note{
  font-size:12px;
  opacity:0.9;
  text-align:center;
}

/* ===== スライド ===== */
.slider{
  width:100%;
  overflow:hidden;
  margin-top:30px;
}

.slide-track{
  display:flex;
}

.slide-track img{
  width:100vw;
  height:50vw;
  max-height:400px;
  object-fit:cover;
  flex-shrink:0;
}

/* ===== セクション ===== */
.section{
  padding:60px 20px;
  text-align:center;
}

.section h2{
  font-size:28px;
  margin-bottom:30px;
}

/* ===== ここが変更（ベース） ===== */
.card{
  background:rgba(255,255,255,0.08);
  color:#fff;
  border-radius:20px;
  padding:22px;
  margin:15px auto;
  width:90%;
  max-width:500px;

  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* 金強調 */
.gold{
  color:#D4AF37;
  font-size:24px;
  font-weight:bold;
}

/* ===== 追尾LINEボタン ===== */
.floating-btn{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:420px;
  background:#00C300;
  color:#fff;
  text-align:center;
  padding:16px 20px;
  border-radius:50px;
  font-size:17px;
  font-weight:bold;
  text-decoration:none;
  z-index:999;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  box-shadow:0 8px 20px rgba(0,0,0,0.25);

  animation:pulse 2.5s infinite;
}

@keyframes pulse{
  0%,100%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.04)}
}

.floating-btn:active{
  transform:translateX(-50%) scale(0.95);
}

.floating-sub{
  display:block;
  font-size:11px;
  opacity:0.85;
  margin-top:2px;
}
</style>
