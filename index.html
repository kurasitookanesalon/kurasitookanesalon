<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
}

.hero{
  height:100vh;
  overflow:hidden;
  position:relative;
}

/* 👇ここが最重要 */
.track{
  display:flex;
  width:max-content;   /* ←これでピッタリ繋がる */
  height:100%;
  animation: flow 20s linear infinite;
}

/* 画像 */
.img{
  height:100%;
  width:auto;
  display:block;       /* ←隙間防止 */
}

/* 無限ループ（ズレ修正） */
@keyframes flow{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(-50%); }
}

/* 暗幕 */
.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:1;
}

.hero-content{
  position:absolute;
  z-index:2;
  color:white;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
}
</style>
</head>

<body>

<section class="hero">

  <div class="track">

    <!-- 1周目 -->
    <img src="41604837-5C3A-4DF9-B10F-E837EC243D5B.png" class="img">
    <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png" class="img">
    <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png" class="img">
    <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png" class="img">
    <img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png" class="img">
    <img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png" class="img">

    <!-- 2周目（完全コピー） -->
    <img src="41604837-5C3A-4DF9-B10F-E837EC243D5B.png" class="img">
    <img src="480EA703-74CE-4342-9595-AB8F5ABDD83D.png" class="img">
    <img src="6648FF22-7681-4F3D-8A69-FF57A9D10207.png" class="img">
    <img src="89804053-68C8-4E48-A98F-6E56CD01A26C.png" class="img">
    <img src="DEA53687-842A-4E25-9838-AE0A1C0C0C49.png" class="img">
    <img src="DEB3CB95-790F-4F78-AED3-B2B77C169FCF.png" class="img">

  </div>

  <div class="hero-content">
    <h1>くらしとお金サロン</h1>
  </div>

</section>

</body>
</html>
